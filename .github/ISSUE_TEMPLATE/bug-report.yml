name: Bug report
description: Create a report to help us improve
title: "[BUG] "
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Write a short and concise description of your bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: What did you do to make this happen?
      placeholder: |
        1. Using ...
        2. Do ...
        3. Then use ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: If you have any other context about the problem such as screenshots or videos, add them here.
    validations:
      required: false

  - type: input
    id: current-version
    attributes:
      label: Current Version
      description: What version of the resource are you currently using?
      placeholder: e.g. v1.0.0, v1.0.5
    validations:
      required: true
